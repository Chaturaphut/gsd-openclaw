<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSD-OpenClaw Dashboard</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-hover: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --cyan: #39d2c0;
      --orange: #f0883e;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* ─── Header ─────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
    }

    header h1 span { color: var(--accent); }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.9; }

    /* ─── Grid ───────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }

    .grid-wide {
      grid-template-columns: 1fr;
    }

    /* ─── Cards ──────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .card-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .card-header .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-green { background: rgba(63,185,80,0.2); color: var(--green); }
    .badge-yellow { background: rgba(210,153,34,0.2); color: var(--yellow); }
    .badge-red { background: rgba(248,81,73,0.2); color: var(--red); }
    .badge-blue { background: rgba(88,166,255,0.2); color: var(--accent); }

    /* ─── Stats ──────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
    }

    .stat {
      text-align: center;
      padding: 16px;
      background: var(--bg);
      border-radius: 8px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ─── Progress Bar ───────────────────────── */
    .progress-container {
      margin: 8px 0;
    }

    .progress-bar {
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ─── Phase List ─────────────────────────── */
    .phase-list { list-style: none; }

    .phase-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .phase-item:last-child { border-bottom: none; }
    .phase-item:hover { background: var(--bg-hover); border-radius: 8px; }

    .phase-icon { font-size: 1.5rem; }

    .phase-info { flex: 1; }
    .phase-name { font-weight: 600; }
    .phase-meta { font-size: 0.8rem; color: var(--text-dim); }

    .phase-status {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* ─── Wave Timeline ──────────────────────── */
    .wave-timeline {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding: 8px 0;
    }

    .wave-block {
      min-width: 200px;
      flex: 1;
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      border-left: 4px solid var(--accent);
    }

    .wave-block:nth-child(2) { border-left-color: var(--purple); }
    .wave-block:nth-child(3) { border-left-color: var(--cyan); }
    .wave-block:nth-child(4) { border-left-color: var(--orange); }

    .wave-title {
      font-weight: 600;
      margin-bottom: 8px;
    }

    .wave-tasks { list-style: none; }

    .wave-tasks li {
      padding: 4px 0;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .wave-tasks li::before {
      content: '▸ ';
      color: var(--accent);
    }

    /* ─── Agent Table ────────────────────────── */
    .agent-table {
      width: 100%;
      border-collapse: collapse;
    }

    .agent-table th {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.8rem;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .agent-table td {
      padding: 10px 12px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    .agent-table tr:hover td { background: var(--bg-hover); }

    /* ─── QA Summary ─────────────────────────── */
    .qa-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
    }

    .qa-item {
      text-align: center;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
    }

    .qa-value { font-size: 1.4rem; font-weight: 700; }
    .qa-label { font-size: 0.75rem; color: var(--text-dim); }

    /* ─── Upload Zone ────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(88,166,255,0.05);
    }

    .upload-zone h3 { margin-bottom: 8px; }
    .upload-zone p { color: var(--text-dim); font-size: 0.9rem; }

    #paste-area {
      width: 100%;
      min-height: 120px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      resize: vertical;
      margin-top: 12px;
    }

    .hidden { display: none; }

    /* ─── Responsive ─────────────────────────── */
    @media (max-width: 768px) {
      .container { padding: 16px; }
      header h1 { font-size: 1.4rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .wave-timeline { flex-direction: column; }
      .wave-block { min-width: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header>
      <h1>📊 <span>GSD</span>-OpenClaw Dashboard</h1>
      <div class="header-actions">
        <button class="btn" onclick="toggleUpload()">📂 Load Data</button>
        <button class="btn" onclick="loadSample()">🎯 Sample Data</button>
        <span id="timestamp" style="font-size:0.8rem; color:var(--text-dim);"></span>
      </div>
    </header>

    <!-- Upload Section -->
    <div id="upload-section" class="card" style="margin-bottom: 24px;">
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <h3>📁 Drop JSON file here or click to browse</h3>
        <p>Export data with: <code>dashboard/export-data.sh</code></p>
        <input type="file" id="file-input" accept=".json" class="hidden" onchange="handleFile(event)">
      </div>
      <p style="text-align:center; margin: 12px 0; color: var(--text-dim);">— or paste JSON below —</p>
      <textarea id="paste-area" placeholder='Paste your GSD dashboard JSON here...'></textarea>
      <div style="text-align:center; margin-top:12px;">
        <button class="btn btn-primary" onclick="loadPasted()">Load Pasted Data</button>
      </div>
    </div>

    <!-- Dashboard Content (hidden until data loaded) -->
    <div id="dashboard" class="hidden">

      <!-- Summary Stats -->
      <div class="grid" id="stats-grid">
        <div class="card">
          <div class="card-header">
            <h2>📋 Overview</h2>
            <span class="badge badge-blue" id="project-name">Project</span>
          </div>
          <div class="stats" id="overview-stats"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>🧪 Quality</h2>
            <span class="badge" id="quality-badge">—</span>
          </div>
          <div class="qa-grid" id="quality-stats"></div>
        </div>
      </div>

      <!-- Phase Progress -->
      <div class="card" style="margin-bottom: 24px;">
        <div class="card-header">
          <h2>🔄 Workflow Stages</h2>
        </div>
        <ul class="phase-list" id="phase-list"></ul>
      </div>

      <!-- Wave Timeline -->
      <div class="card" style="margin-bottom: 24px;">
        <div class="card-header">
          <h2>🌊 Wave Execution Timeline</h2>
        </div>
        <div class="wave-timeline" id="wave-timeline"></div>
      </div>

      <!-- Agent & QA Grid -->
      <div class="grid">
        <!-- Agent Assignments -->
        <div class="card">
          <div class="card-header">
            <h2>👥 Agent Assignments</h2>
          </div>
          <table class="agent-table">
            <thead>
              <tr>
                <th>Agent</th>
                <th>Role</th>
                <th>Tasks</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="agent-table-body"></tbody>
          </table>
        </div>

        <!-- QA Results -->
        <div class="card">
          <div class="card-header">
            <h2>✅ QA Results</h2>
          </div>
          <div id="qa-results"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── State ──────────────────────────────────
    let dashboardData = null;

    // ─── File Handling ──────────────────────────
    const dropZone = document.getElementById('drop-zone');

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) readFile(file);
    });

    function handleFile(event) {
      const file = event.target.files[0];
      if (file) readFile(file);
    }

    function readFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          dashboardData = JSON.parse(e.target.result);
          renderDashboard();
        } catch (err) {
          alert('Invalid JSON: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    function loadPasted() {
      const text = document.getElementById('paste-area').value.trim();
      if (!text) { alert('Paste JSON data first'); return; }
      try {
        dashboardData = JSON.parse(text);
        renderDashboard();
      } catch (err) {
        alert('Invalid JSON: ' + err.message);
      }
    }

    function toggleUpload() {
      const section = document.getElementById('upload-section');
      section.classList.toggle('hidden');
    }

    // ─── Sample Data ────────────────────────────
    function loadSample() {
      dashboardData = {
        project: "My Awesome App",
        generated: new Date().toISOString(),
        summary: {
          total_phases: 3,
          completed_phases: 2,
          total_tasks: 15,
          completed_tasks: 11,
          total_waves: 7,
          qa_pass_rate: 93.5,
          rework_cycles: 2,
          total_regressions: 0,
          blockers_encountered: 1,
          stub_count: 0,
          decisions_made: 8
        },
        phases: [
          {
            name: "Phase 1: API Setup",
            status: "complete",
            tasks: { total: 5, completed: 5 },
            waves: [
              { name: "Wave 1: DB & Auth", tasks: ["DB Schema", "Auth Module", "Config"] },
              { name: "Wave 2: API Routes", tasks: ["REST Endpoints", "Middleware"] }
            ],
            qa: { passed: true, pass_count: 12, fail_count: 0 }
          },
          {
            name: "Phase 2: Frontend",
            status: "complete",
            tasks: { total: 6, completed: 6 },
            waves: [
              { name: "Wave 1: Components", tasks: ["Layout", "Auth Pages", "Dashboard"] },
              { name: "Wave 2: Integration", tasks: ["API Client", "State Mgmt"] },
              { name: "Wave 3: Polish", tasks: ["Responsive", "Error States"] }
            ],
            qa: { passed: true, pass_count: 18, fail_count: 1 }
          },
          {
            name: "Phase 3: Deployment",
            status: "in-progress",
            tasks: { total: 4, completed: 0 },
            waves: [
              { name: "Wave 1: Setup", tasks: ["Docker", "CI/CD", "Monitoring"] },
              { name: "Wave 2: Deploy", tasks: ["Production Deploy"] }
            ],
            qa: { passed: false, pass_count: 0, fail_count: 0 }
          }
        ],
        agents: [
          { id: "Agent-1", role: "Developer", tasks_assigned: 8, tasks_completed: 8, status: "idle" },
          { id: "Agent-2", role: "Developer", tasks_assigned: 5, tasks_completed: 3, status: "active" },
          { id: "Agent-3", role: "QA", tasks_assigned: 3, tasks_completed: 2, status: "active" },
          { id: "Agent-4", role: "Architect", tasks_assigned: 2, tasks_completed: 2, status: "idle" }
        ],
        qa_summary: {
          total_checks: 30,
          passed: 28,
          failed: 1,
          skipped: 1,
          categories: {
            functional: { passed: 12, failed: 0 },
            regression: { passed: 8, failed: 1 },
            stub_detection: { passed: 5, failed: 0 },
            security: { passed: 3, failed: 0 }
          }
        }
      };
      renderDashboard();
    }

    // ─── Render Dashboard ───────────────────────
    function renderDashboard() {
      if (!dashboardData) return;

      document.getElementById('upload-section').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');

      const d = dashboardData;
      const s = d.summary || {};

      // Timestamp
      document.getElementById('timestamp').textContent =
        d.generated ? `Updated: ${new Date(d.generated).toLocaleString()}` : '';

      // Project name
      document.getElementById('project-name').textContent = d.project || 'Project';

      // Overview stats
      const overviewHTML = `
        <div class="stat">
          <div class="stat-value" style="color:var(--accent)">${s.completed_phases || 0}/${s.total_phases || 0}</div>
          <div class="stat-label">Phases</div>
        </div>
        <div class="stat">
          <div class="stat-value" style="color:var(--green)">${s.completed_tasks || 0}/${s.total_tasks || 0}</div>
          <div class="stat-label">Tasks</div>
        </div>
        <div class="stat">
          <div class="stat-value" style="color:var(--purple)">${s.total_waves || 0}</div>
          <div class="stat-label">Waves</div>
        </div>
        <div class="stat">
          <div class="stat-value" style="color:var(--cyan)">${s.decisions_made || 0}</div>
          <div class="stat-label">Decisions</div>
        </div>
      `;
      document.getElementById('overview-stats').innerHTML = overviewHTML;

      // Quality stats
      const qaRate = s.qa_pass_rate || 0;
      const qBadge = document.getElementById('quality-badge');
      qBadge.textContent = qaRate + '%';
      qBadge.className = 'badge ' + (qaRate >= 90 ? 'badge-green' : qaRate >= 70 ? 'badge-yellow' : 'badge-red');

      document.getElementById('quality-stats').innerHTML = `
        <div class="qa-item">
          <div class="qa-value" style="color:var(--green)">${qaRate}%</div>
          <div class="qa-label">QA Pass Rate</div>
        </div>
        <div class="qa-item">
          <div class="qa-value" style="color:var(--yellow)">${s.rework_cycles || 0}</div>
          <div class="qa-label">Rework Cycles</div>
        </div>
        <div class="qa-item">
          <div class="qa-value" style="color:${(s.total_regressions || 0) > 0 ? 'var(--red)' : 'var(--green)'}">${s.total_regressions || 0}</div>
          <div class="qa-label">Regressions</div>
        </div>
        <div class="qa-item">
          <div class="qa-value" style="color:${(s.stub_count || 0) > 0 ? 'var(--red)' : 'var(--green)'}">${s.stub_count || 0}</div>
          <div class="qa-label">Stubs</div>
        </div>
      `;

      // Phases
      renderPhases(d.phases || []);

      // Waves
      renderWaves(d.phases || []);

      // Agents
      renderAgents(d.agents || []);

      // QA Results
      renderQA(d.qa_summary || {});
    }

    function renderPhases(phases) {
      const list = document.getElementById('phase-list');
      if (!phases.length) {
        list.innerHTML = '<li class="phase-item"><span style="color:var(--text-dim)">No phases loaded</span></li>';
        return;
      }

      list.innerHTML = phases.map(p => {
        const status = p.status || 'pending';
        const icons = { complete: '✅', 'in-progress': '⚡', blocked: '🚫', pending: '⬜' };
        const colors = { complete: 'badge-green', 'in-progress': 'badge-blue', blocked: 'badge-red', pending: '' };
        const tasks = p.tasks || {};
        const pct = tasks.total ? Math.round((tasks.completed || 0) / tasks.total * 100) : 0;
        const fillColor = pct >= 80 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)';

        return `
          <li class="phase-item">
            <span class="phase-icon">${icons[status] || '⬜'}</span>
            <div class="phase-info">
              <div class="phase-name">${p.name}</div>
              <div class="progress-container">
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${pct}%; background:${fillColor};"></div>
                </div>
                <div class="progress-text">
                  <span>${tasks.completed || 0}/${tasks.total || 0} tasks</span>
                  <span>${pct}%</span>
                </div>
              </div>
            </div>
            <span class="phase-status ${colors[status] || ''}" style="padding:4px 10px;border-radius:20px;font-size:0.75rem;">${status}</span>
          </li>
        `;
      }).join('');
    }

    function renderWaves(phases) {
      const timeline = document.getElementById('wave-timeline');
      const allWaves = [];
      phases.forEach(p => {
        (p.waves || []).forEach(w => allWaves.push(w));
      });

      if (!allWaves.length) {
        timeline.innerHTML = '<div style="color:var(--text-dim);padding:20px;">No wave data</div>';
        return;
      }

      timeline.innerHTML = allWaves.map(w => `
        <div class="wave-block">
          <div class="wave-title">🌊 ${w.name}</div>
          <ul class="wave-tasks">
            ${(w.tasks || []).map(t => `<li>${t}</li>`).join('')}
          </ul>
        </div>
      `).join('');
    }

    function renderAgents(agents) {
      const tbody = document.getElementById('agent-table-body');
      if (!agents.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-dim)">No agent data</td></tr>';
        return;
      }

      tbody.innerHTML = agents.map(a => {
        const statusColors = { active: 'var(--green)', idle: 'var(--text-dim)', blocked: 'var(--red)' };
        return `
          <tr>
            <td>${a.id}</td>
            <td>${a.role}</td>
            <td>${a.tasks_completed || 0}/${a.tasks_assigned || 0}</td>
            <td style="color:${statusColors[a.status] || 'var(--text-dim)'}">${a.status || '—'}</td>
          </tr>
        `;
      }).join('');
    }

    function renderQA(qa) {
      const container = document.getElementById('qa-results');
      if (!qa.total_checks) {
        container.innerHTML = '<p style="color:var(--text-dim);padding:12px;">No QA data</p>';
        return;
      }

      const cats = qa.categories || {};
      let catHTML = '';
      Object.entries(cats).forEach(([name, data]) => {
        const total = (data.passed || 0) + (data.failed || 0);
        const pct = total ? Math.round(data.passed / total * 100) : 0;
        const color = pct >= 90 ? 'var(--green)' : pct >= 70 ? 'var(--yellow)' : 'var(--red)';
        catHTML += `
          <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
            <span style="text-transform:capitalize;">${name.replace(/_/g, ' ')}</span>
            <span style="color:${color}; font-weight:600;">${data.passed}/${total} (${pct}%)</span>
          </div>
        `;
      });

      container.innerHTML = `
        <div class="qa-grid" style="margin-bottom:16px;">
          <div class="qa-item">
            <div class="qa-value" style="color:var(--green)">${qa.passed || 0}</div>
            <div class="qa-label">Passed</div>
          </div>
          <div class="qa-item">
            <div class="qa-value" style="color:var(--red)">${qa.failed || 0}</div>
            <div class="qa-label">Failed</div>
          </div>
          <div class="qa-item">
            <div class="qa-value" style="color:var(--text-dim)">${qa.skipped || 0}</div>
            <div class="qa-label">Skipped</div>
          </div>
        </div>
        <h3 style="font-size:0.9rem; margin-bottom:8px;">By Category</h3>
        ${catHTML}
      `;
    }
  </script>
</body>
</html>
